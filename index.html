<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chess.is-a.dev — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400;0,500;0,700;1,400&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #A4B1FF;
      --ink-dim: rgba(164,177,255,0.45);
      --ink-ghost: rgba(164,177,255,0.12);
      --ink-faint: rgba(164,177,255,0.06);
      --bg: #1B1B1F;
      --surface: #161618;
      --border: rgba(164,177,255,0.13);
      --gold: #F0C060;
      --silver: #A4B1FF;
      --bronze: #C8956A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Fira Code', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      opacity: 0.6;
    }

    .glow-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-blob.a {
      width: 500px; height: 300px;
      top: -80px; left: -100px;
      background: rgba(164,177,255,0.055);
    }
    .glow-blob.b {
      width: 400px; height: 400px;
      bottom: 0; right: -120px;
      background: rgba(164,177,255,0.035);
    }

    .topbar {
      position: relative; z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 32px 22px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(22,22,24,0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .topbar-left {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    .site-name {
      font-family: 'Familjen Grotesk', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .site-sub {
      font-size: 10px;
      color: var(--ink-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .mode-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }

    .mode-btn {
      padding: 6px 16px;
      border-radius: 5px;
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--ink-dim);
      transition: all 0.18s ease;
      position: relative;
    }

    .mode-btn:hover { color: var(--ink); }

    .mode-btn.active {
      background: var(--ink-ghost);
      color: var(--ink);
    }

    .main {
      position: relative; z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 52px 32px 80px;
    }

    .hero {
      margin-bottom: 48px;
    }

    .hero-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 10px;
    }

    .hero-title {
      font-family: 'Familjen Grotesk', sans-serif;
      font-size: clamp(40px, 8vw, 68px);
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.04em;
      line-height: 0.95;
    }

    .hero-title em {
      font-style: italic;
      color: var(--ink-dim);
    }

    .hero-rule {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .hero-rule-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .hero-rule-text {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-dim);
      white-space: nowrap;
    }

    .col-heads {
      display: grid;
      grid-template-columns: 64px 1fr 110px 110px;
      gap: 0;
      padding: 0 0 10px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }

    .col-head {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }

    .col-head.right { text-align: right; }
    .col-head.hl { color: var(--ink); }

    .player-list { list-style: none; }

    .player-row {
      display: grid;
      grid-template-columns: 64px 1fr 110px 110px;
      gap: 0;
      align-items: center;
      padding: 18px 0;
      border-bottom: 1px solid var(--ink-faint);
      position: relative;
      cursor: default;
      animation: rowIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .player-row::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--ink-faint);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      margin: 0 -32px;
    }

    .player-row:hover::after { opacity: 1; }

    .p-rank {
      font-family: 'Familjen Grotesk', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: var(--ink-ghost);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .p-rank.r1 { color: var(--gold); }
    .p-rank.r2 { color: var(--silver); opacity: 0.7; }
    .p-rank.r3 { color: var(--bronze); }

    .p-name-wrap { display: flex; flex-direction: column; gap: 3px; }

    .p-name {
      font-family: 'Familjen Grotesk', sans-serif;
      font-size: 17px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .p-badge {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }

    .p-rating {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }

    .p-rating-val {
      font-family: 'Familjen Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--ink-dim);
      letter-spacing: -0.02em;
      transition: color 0.2s;
    }

    .p-rating-val.active-sort { color: var(--ink); }

    .p-rating-lbl {
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(164,177,255,0.25);
    }

    .loading-state {
      padding: 60px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: var(--ink-dim);
      font-size: 11px;
      letter-spacing: 0.15em;
    }

    .loader {
      width: 24px; height: 24px;
      border: 2px solid var(--ink-ghost);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      margin-top: 52px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .fn-icon {
      font-size: 20px;
      line-height: 1;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .fn-text {
      font-size: 11px;
      line-height: 1.8;
      color: var(--ink-dim);
    }

    .fn-text strong { color: var(--ink); font-weight: 500; }

    .fn-text a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.15s;
    }

    .fn-text a:hover { border-color: var(--ink); }
    .fn-text code {
      background: var(--ink-faint);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
    }

    .meta-bar {
      margin-top: 24px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(164,177,255,0.2);
    }

    .refresh-btn {
      background: none;
      border: none;
      font-family: 'Fira Code', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(164,177,255,0.25);
      cursor: pointer;
      transition: color 0.2s;
      padding: 0;
    }
    .refresh-btn:hover { color: var(--ink); }

    @media (max-width: 520px) {
      .main { padding: 36px 20px 60px; }
      .topbar { padding: 18px 20px; }
      .col-heads { grid-template-columns: 48px 1fr 80px 80px; }
      .player-row { grid-template-columns: 48px 1fr 80px 80px; }
      .p-rank { font-size: 22px; }
      .p-name { font-size: 14px; }
      .p-rating-val { font-size: 16px; }
      .hero-title { font-size: 36px; }
      .player-row::after { margin: 0 -20px; }
    }
  </style>
</head>
<body>

  <div class="glow-blob a"></div>
  <div class="glow-blob b"></div>

  <header class="topbar">
    <div class="topbar-left">
      <span class="site-name">♜ chess.is-a.dev</span>
    </div>
    <div class="mode-toggle" role="group" aria-label="Sort by rating type">
      <button class="mode-btn active" id="btn-rapid" onclick="setMode('rapid')">Rapid</button>
      <button class="mode-btn" id="btn-blitz" onclick="setMode('blitz')">Blitz</button>
    </div>
  </header>

  <main class="main">

    <div class="hero">
      <p class="hero-label">is-a.dev · unofficial</p>
      <h1 class="hero-title">Leaderboard.</h1>
      <div class="hero-rule">
        <div class="hero-rule-line"></div>
        <span class="hero-rule-text" id="mode-label">Ranked by Rapid</span>
        <div class="hero-rule-line"></div>
      </div>
    </div>

    <div class="col-heads">
      <span class="col-head">#</span>
      <span class="col-head">Player</span>
      <span class="col-head right" id="head-rapid" style="color:var(--ink)">Rapid</span>
      <span class="col-head right" id="head-blitz">Blitz</span>
    </div>

    <div id="loading" class="loading-state">
      <div class="loader"></div>
      <span>Fetching ratings...</span>
    </div>
    <ul id="player-list" class="player-list" style="display:none"></ul>

    <div class="footer-note">
      <p class="fn-text">
        <strong>Want to appear on this leaderboard?</strong><br>
        Fork the <a href="https://github.com/EducatedSuddenBucket" target="_blank" rel="noopener">GitHub repo</a>
        and add your Chess.com username to <code>players.json</code> in your fork and create a pull request.
      </p>
    </div>

    <div class="meta-bar">
      <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
    </div>

  </main>

  <script>
    let currentMode = 'rapid';
    let allData = [];

    const badges = ['', '2nd place', '3rd place'];
    const rankClass = i => ['r1','r2','r3'][i] ?? '';

    async function fetchPlayer(username) {
      const res = await fetch(`https://api.chess.com/pub/player/${username}/stats`);
      const d = await res.json();
      return {
        username,
        rapid: d.chess_rapid?.last?.rating ?? null,
        blitz: d.chess_blitz?.last?.rating ?? null,
      };
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('btn-rapid').classList.toggle('active', mode === 'rapid');
      document.getElementById('btn-blitz').classList.toggle('active', mode === 'blitz');
      document.getElementById('mode-label').textContent = mode === 'rapid' ? 'Ranked by Rapid' : 'Ranked by Blitz';
      document.getElementById('head-rapid').style.color = mode === 'rapid' ? 'var(--ink)' : 'var(--ink-dim)';
      document.getElementById('head-blitz').style.color = mode === 'blitz' ? 'var(--ink)' : 'var(--ink-dim)';
      if (allData.length) renderList();
    }

    function renderList() {
      const sorted = [...allData].sort((a, b) => {
        const av = a[currentMode] ?? -1;
        const bv = b[currentMode] ?? -1;
        return bv - av;
      });

      const ul = document.getElementById('player-list');
      ul.innerHTML = sorted.map((p, i) => `
        <li class="player-row" style="animation-delay:${i * 0.06}s">
          <div class="p-rank ${rankClass(i)}">${String(i + 1).padStart(2,'0')}</div>
          <div class="p-name-wrap">
            <span class="p-name">${p.username}</span>
            ${i < 3 ? `<span class="p-badge">${['Champion','Runner-up','Third place'][i]}</span>` : ''}
          </div>
          <div class="p-rating">
            <span class="p-rating-val ${currentMode === 'rapid' ? 'active-sort' : ''}">${p.rapid ?? '—'}</span>
            <span class="p-rating-lbl">rapid</span>
          </div>
          <div class="p-rating">
            <span class="p-rating-val ${currentMode === 'blitz' ? 'active-sort' : ''}">${p.blitz ?? '—'}</span>
            <span class="p-rating-lbl">blitz</span>
          </div>
        </li>
      `).join('');

      document.getElementById('loading').style.display = 'none';
      ul.style.display = 'block';
    }

    async function refresh() {
      document.getElementById('loading').innerHTML = '<div class="loader"></div><span>Fetching ratings...</span>';
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('player-list').style.display = 'none';
      allData = [];

      try {
        const cfg = await fetch('players.json').then(r => r.json());
allData = await Promise.all(cfg.map(fetchPlayer));
        renderList();
      } catch (e) {
        console.error(e);
        document.getElementById('loading').innerHTML = '<span style="color:var(--ink-dim)">Failed to load. Do not check console.</span>';
      }
    }

    refresh();
  </script>

</body>
</html>
